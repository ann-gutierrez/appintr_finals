<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>MentorMatch — Sign In</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#3211d4",
              "background-dark": "#131022",
            },
            fontFamily: { display: ["Inter", "sans-serif"] },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .bg-page {
        background: #131022;
        background-image:
          radial-gradient(
            ellipse 80% 60% at 50% -10%,
            rgba(50, 17, 212, 0.35) 0%,
            transparent 70%
          ),
          radial-gradient(
            circle at 80% 90%,
            rgba(50, 17, 212, 0.15) 0%,
            transparent 50%
          );
      }
      /* Role card */
      .role-card {
        border: 2px solid rgba(255, 255, 255, 0.07);
        background: rgba(255, 255, 255, 0.04);
        border-radius: 1rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .role-card:hover {
        border-color: rgba(50, 17, 212, 0.5);
        background: rgba(50, 17, 212, 0.1);
        transform: translateY(-2px);
      }
      .role-card.selected {
        border-color: #3211d4;
        background: rgba(50, 17, 212, 0.18);
        box-shadow: 0 0 0 3px rgba(50, 17, 212, 0.2);
      }
      .role-card.selected .role-icon {
        color: #a78bfa;
      }
      /* Input */
      .field {
        width: 100%;
        background: rgba(255, 255, 255, 0.06);
        border: 1.5px solid rgba(255, 255, 255, 0.1);
        border-radius: 0.75rem;
        color: rgb(120, 152, 255);
        padding: 0.75rem 1rem;
        font-size: 0.875rem;
        outline: none;
        transition: border-color 0.2s;
      }
      .field::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }
      .field:focus {
        border-color: #3211d4;
        box-shadow: 0 0 0 3px rgba(50, 17, 212, 0.2);
      }
      /* Submit button */
      .btn-primary {
        width: 100%;
        background: #3211d4;
        color: white;
        border-radius: 0.75rem;
        padding: 0.85rem 1rem;
        font-size: 0.9rem;
        font-weight: 700;
        border: none;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn-primary:hover:not(:disabled) {
        background: #2a0db8;
      }
      .btn-primary:active:not(:disabled) {
        transform: scale(0.98);
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      /* Error / success messages */
      .msg {
        border-radius: 0.625rem;
        padding: 0.75rem 1rem;
        font-size: 0.8125rem;
        margin-bottom: 1rem;
        display: none;
      }
      .msg.error {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #fca5a5;
      }
      .msg.success {
        background: rgba(16, 185, 129, 0.15);
        border: 1px solid rgba(16, 185, 129, 0.3);
        color: #6ee7b7;
      }
      /* Separator */
      .sep {
        display: flex;
        align-items: center;
        gap: 12px;
        color: rgba(255, 255, 255, 0.2);
        font-size: 0.75rem;
        margin: 1.5rem 0;
      }
      .sep::before,
      .sep::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
      }
      /* Animate in */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-up {
        animation: fadeUp 0.5s ease both;
      }
      .fade-up-2 {
        animation: fadeUp 0.5s 0.1s ease both;
      }
      .fade-up-3 {
        animation: fadeUp 0.5s 0.2s ease both;
      }
    </style>
  </head>
  <body
    class="bg-page min-h-screen flex items-center justify-center px-4 py-12"
  >
    <div class="w-full max-w-md">
      <!-- Logo -->
      <div class="text-center mb-8 fade-up">
        <div
          class="inline-flex items-center justify-center h-14 w-14 rounded-2xl bg-primary/20 border border-primary/30 mb-4"
        >
          <span class="material-symbols-outlined text-3xl text-violet-400"
            >school</span
          >
        </div>
        <h1 class="text-2xl font-bold text-white tracking-tight">
          MentorMatch
        </h1>
        <p class="text-sm text-white/40 mt-1">
          Connecting students with the right mentors
        </p>
      </div>

      <!-- Card -->
      <div
        class="rounded-2xl border border-white/8 bg-white/5 backdrop-blur-sm p-8 shadow-2xl fade-up-2"
      >
        <!-- Role selector -->
        <div class="mb-6">
          <p
            class="text-xs font-bold uppercase tracking-widest text-white/40 mb-3"
          >
            I am a…
          </p>
          <div class="grid grid-cols-3 gap-3">
            <div
              class="role-card p-3 text-center"
              data-role="student"
              id="roleStudent"
            >
              <span
                class="material-symbols-outlined text-2xl role-icon text-white/40 block mb-1"
                >school</span
              >
              <p class="text-xs font-semibold text-white/70">Student</p>
            </div>
            <div
              class="role-card p-3 text-center"
              data-role="mentor"
              id="roleMentor"
            >
              <span
                class="material-symbols-outlined text-2xl role-icon text-white/40 block mb-1"
                >person_book</span
              >
              <p class="text-xs font-semibold text-white/70">Mentor</p>
            </div>
            <div
              class="role-card p-3 text-center"
              data-role="admin"
              id="roleAdmin"
            >
              <span
                class="material-symbols-outlined text-2xl role-icon text-white/40 block mb-1"
                >manage_accounts</span
              >
              <p class="text-xs font-semibold text-white/70">Admin</p>
            </div>
          </div>
        </div>

        <!-- Message -->
        <div id="loginMsg" class="msg"></div>

        <!-- Form -->
        <form id="loginForm" novalidate>
          <div class="space-y-4">
            <div>
              <label
                class="block text-xs font-semibold text-white/50 mb-1.5 uppercase tracking-wider"
                >Email</label
              >
              <input
                id="loginEmail"
                type="email"
                autocomplete="email"
                placeholder="you@university.edu"
                class="field"
                required
              />
            </div>
            <div>
              <div class="flex items-center justify-between mb-1.5">
                <label
                  class="block text-xs font-semibold text-white/50 uppercase tracking-wider"
                  >Password</label
                >
                <a
                  href="#"
                  class="text-xs text-primary/80 hover:text-violet-400 transition-colors"
                  >Forgot password?</a
                >
              </div>
              <div class="relative">
                <input
                  id="loginPassword"
                  type="password"
                  autocomplete="current-password"
                  placeholder="••••••••"
                  class="field pr-12"
                  required
                />
                <button
                  type="button"
                  id="togglePassword"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60 transition-colors"
                >
                  <span
                    id="togglePasswordIcon"
                    class="material-symbols-outlined text-xl"
                    >visibility</span
                  >
                </button>
              </div>
            </div>

            <!-- Role hint (contextual) -->
            <div
              id="roleHint"
              class="hidden rounded-xl bg-primary/10 border border-primary/20 px-4 py-3 text-xs text-violet-300 flex items-start gap-2"
            >
              <span class="material-symbols-outlined text-base shrink-0 mt-0.5"
                >info</span
              >
              <span id="roleHintText"></span>
            </div>
          </div>

          <div class="mt-6">
            <button type="submit" id="loginBtn" class="btn-primary" disabled>
              <span class="material-symbols-outlined text-lg">login</span>
              <span id="loginBtnText">Select a role to continue</span>
            </button>
          </div>
        </form>

        <!-- Divider -->
        <div class="sep">or</div>

        <!-- Register links -->
        <div class="text-center space-y-2">
          <p class="text-xs text-white/30">Don't have an account?</p>
          <div class="flex gap-2 justify-center flex-wrap">
            <a
              href="register-student.html"
              class="px-4 py-2 rounded-xl border border-white/10 text-xs font-semibold text-white/60 hover:bg-white/5 hover:text-white transition-colors flex items-center gap-1.5"
            >
              <span class="material-symbols-outlined text-sm">school</span>
              Register as Student
            </a>
            <a
              href="register-mentor.html"
              class="px-4 py-2 rounded-xl border border-white/10 text-xs font-semibold text-white/60 hover:bg-white/5 hover:text-white transition-colors flex items-center gap-1.5"
            >
              <span class="material-symbols-outlined text-sm">person_book</span>
              Register as Mentor
            </a>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <p class="text-center text-xs text-white/20 mt-6 fade-up-3">
        © 2025 MentorMatch · Academic Year 25/26
      </p>
    </div>

    <script src="js/logindashboard.js"></script>
  </body>
</html>

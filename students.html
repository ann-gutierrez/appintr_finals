<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>BorrowBox Admin - Students</title>

    <script src="js/theme-init.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#3211d4",
              "background-light": "#f6f6f8",
              "background-dark": "#131022",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>

    <style>
      body {
        font-family: "Inter", sans-serif;
      }

      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
  </head>

  <body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased transition-colors duration-200"
  >
    <div class="relative flex min-h-screen w-full flex-col">
      <!-- TOP NAV -->
      <header
        class="sticky top-0 z-40 flex h-16 w-full items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-6"
      >
        <div class="flex items-center gap-4">
          <div class="flex items-center gap-2 text-primary">
            <span class="material-symbols-outlined text-3xl font-bold"
              >package_2</span
            >
            <h2 class="text-xl font-bold tracking-tight">BorrowBox</h2>
          </div>

          <div class="h-6 w-px bg-slate-200 dark:bg-slate-700 mx-2"></div>

          <h1 class="text-sm font-semibold text-slate-600 dark:text-slate-400">
            Student Management
          </h1>
        </div>

        <button
          id="themeToggle"
          class="flex h-10 w-10 items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
          type="button"
        >
          <span
            id="themeIcon"
            class="material-symbols-outlined text-slate-600 dark:text-slate-300"
          >
            dark_mode
          </span>
        </button>
      </header>

      <div class="flex flex-1 overflow-hidden">
        <!-- SIDEBAR -->
        <aside
          class="hidden lg:flex w-72 flex-col border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark p-4 overflow-y-auto"
        >
          <nav class="space-y-1">
            <p
              class="px-3 text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2"
            >
              General
            </p>

            <a
              class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300 transition-colors"
              href="admindashboard.html"
            >
              <span class="material-symbols-outlined text-xl">grid_view</span>
              <span class="text-sm">Dashboard</span>
            </a>

            <p
              class="px-3 text-[10px] font-bold uppercase tracking-widest text-slate-400 mt-4 mb-2"
            >
              Management
            </p>

            <a
              class="flex items-center gap-3 px-3 py-2 rounded-lg bg-primary text-white font-medium"
              href="students.html"
            >
              <span class="material-symbols-outlined text-xl">school</span>
              <span class="text-sm">Students</span>
            </a>

            <a
              class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300"
              href="employees.html"
            >
              <span class="material-symbols-outlined text-xl">badge</span>
              <span class="text-sm">Employees</span>
            </a>
          </nav>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 overflow-y-auto p-6 md:p-8 space-y-6">
          <!-- SEARCH -->
          <div class="relative w-full xl:max-w-md">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
            >
              search
            </span>

            <input
              class="w-full pl-10 pr-4 py-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl"
              placeholder="Search by name or student number..."
              type="text"
            />
          </div>

          <!-- TABLE -->
          <div
            class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden"
          >
            <div class="overflow-x-auto">
              <table class="w-full text-left border-collapse">
                <thead>
                  <tr
                    class="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-800"
                  >
                    <th class="px-6 py-4 text-xs font-bold uppercase">
                      Student Info
                    </th>
                    <th class="px-6 py-4 text-xs font-bold uppercase">
                      Academic Info
                    </th>
                    <th class="px-6 py-4 text-xs font-bold uppercase">
                      Contact
                    </th>
                    <th class="px-6 py-4 text-xs font-bold uppercase">
                      Gender
                    </th>
                    <th
                      class="px-6 py-4 text-xs font-bold uppercase text-right"
                    >
                      Actions
                    </th>
                  </tr>
                </thead>

                <tbody
                  id="studentsTableBody"
                  class="divide-y divide-slate-100 dark:divide-slate-800"
                >
                  <tr>
                    <td
                      colspan="5"
                      class="px-6 py-10 text-center text-slate-500"
                    >
                      Loading students...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="js/admindashboard.js"></script>
    <script src="js/students.js"></script>
  </body>
</html>

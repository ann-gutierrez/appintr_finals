<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentorMatch Frontend</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <h1>MentorMatch System</h1>
    <p class="subtitle">Plain Frontend Demo using HTML, CSS, and JavaScript</p>

    <!-- STUDENTS -->
    <section class="card">
        <h2>Students</h2>
        <p id="students-message" class="message">Loading students...</p>

        <table id="students-table" class="data-table hidden">
            <thead>
            <tr>
                <th>ID</th>
                <th>Student Number</th>
                <th>Last Name</th>
                <th>First Name</th>
                <th>College</th>
                <th>Department</th>
                <th>Course</th>
                <th>Gender</th>
                <th>Email</th>
                <th>Phone</th>
            </tr>
            </thead>
            <tbody id="students-body"></tbody>
        </table>
    </section>

    <!-- MENTORS -->
    <section class="card">
        <h2>Mentors</h2>
        <p id="mentors-message" class="message">Loading mentors...</p>

        <table id="mentors-table" class="data-table hidden">
            <thead>
            <tr>
                <th>ID</th>
                <th>Mentor Number</th>
                <th>Last Name</th>
                <th>First Name</th>
                <th>Department</th>
                <th>Expertise</th>
                <th>Email</th>
                <th>Phone</th>
            </tr>
            </thead>
            <tbody id="mentors-body"></tbody>
        </table>
    </section>

</div>

<script src="js/app.js"></script>
</body>
</html>
